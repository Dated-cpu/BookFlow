services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://bookflow:bookflow@db:5432/bookflow
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=bookflow
      - POSTGRES_PASSWORD=bookflow
      - POSTGRES_DB=bookflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookflow"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
